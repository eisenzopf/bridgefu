# bridgefu configuration. Copy to /etc/bridgefu/bridgefu.yaml and edit.
config_version: 1
# AWS credentials are NOT here — they come from the EC2 instance role / default
# AWS credential chain. Restart the service to apply changes.
#
# Multi-tenant SIP-URI routing (vapi-demos CONTRACTS.md B.4): each key of
# `tenants:` is a SIP user part; an INVITE to sip:banking@<eip> runs tenant
# `banking`. Match order: Request-URI user part → To: user part →
# default_tenant → reject 404 Not Found (+ bridgefu_unknown_tenant_total).

aws:
  region: us-west-2
  # Legacy single-tenant schema (still accepted when `tenants:` is absent):
  # instance_id / contact_flow_id here become one catch-all tenant named
  # "default" that answers every user part.
  #instance_id: 83a72e61-0000-0000-0000-000000000000
  #contact_flow_id: 2a3b3059-0000-0000-0000-000000000000

sip:
  bind_ip: 0.0.0.0
  port: 5060
  advertised_ip: auto        # "auto" → IMDSv2 public-ipv4 (the Elastic IP); or a literal IP
  media_public_ip: auto      # SDP c=/m= public IP (EC2 1:1 NAT); "auto" or a literal IP

contact:
  default_display_name: "Vapi caller"   # fallback when a tenant sets none
  signaling_timeout_secs: 15
  media_connect_timeout_secs: 30
  keepalive_interval_secs: 10
  session_idle_ttl_secs: 120

# Global header→attribute mapping: used by tenants that don't define their own
# `mapping:` block (and by the legacy single-tenant schema).
mapping:
  unmapped: drop             # drop | pass_prefixed
  passthrough_prefix: "X-"
  rename:                     # inbound SIP header  ->  Connect attribute key
    X-Correlation-Id: correlation_id          # screen-pop key: Vapi sets this header; the Connect flow reads $.Attributes.correlation_id
    X-Vapi-Customer-Id: HostedWidget-customerId
    X-Vapi-Call-Id: HostedWidget-vapiCallId
    X-Account-Tier: HostedWidget-accountTier

# Tenant to route to when neither user part matches; null (or absent) rejects
# unmatched INVITEs with 404.
default_tenant: null

tenants:
  banking:                   # ← sip:banking@<eip>
    instance_id: 83a72e61-0000-0000-0000-000000000000        # Connect instance id
    contact_flow_id: 2a3b3059-0000-0000-0000-000000000000     # this tenant's inbound flow
    default_display_name: "Vapi caller"
    mapping:                 # optional; omit to inherit the global mapping
      unmapped: drop
      rename:
        X-Correlation-Id: correlation_id
        X-Vapi-Call-Id: HostedWidget-vapiCallId
  #retail:                   # ← sip:retail@<eip> — same instance, different flow
  #  instance_id: 83a72e61-0000-0000-0000-000000000000
  #  contact_flow_id: 7c1d2e3f-0000-0000-0000-000000000000

observability:
  log_level: "info,rvoip_amazon_connect=debug"
  log_format: json           # json | pretty
  http_bind: 0.0.0.0:9090    # serves /v1, /livez, /readyz, /metrics

runtime:
  mode: all-in-one            # all-in-one | gateway | worker | moq-relay
  max_concurrent_calls: 100
  setup_timeout_secs: 30
  drain_timeout_secs: 30

# Transactional call state is durable by default. The local path is suitable
# for an all-in-one process; mount its parent directory in a container.
persistence:
  backend: sqlite             # sqlite | postgres | memory (dev/test only)
  database_url: sqlite:///var/lib/bridgefu/bridgefu.db
  # PostgreSQL clusters require a distinct, stable non-nil UUID per worker.
  # worker_id: 00000000-0000-4000-8000-000000000001
  # Memory never activates implicitly:
  # allow_ephemeral_memory: false

api:
  enabled: true
  bearer_token: env:BRIDGEFU_API_TOKEN
  # At least 32 bytes. Required for transactional /v1/calls operations.
  control_hmac_key: env:BRIDGEFU_CONTROL_HMAC_KEY
  # Required with the compatibility shared key when multiple tenants exist.
  # static_tenant: banking

context:
  allow_headers:
    X-Correlation-Id: correlation_id
    X-Vapi-Call-Id: vapi_call_id
    X-Account-Tier: account_tier

broadcast:
  default_transport: moqt     # moqt | uctp-quic
  token_ttl_secs: 300
  max_active: 100
  public_endpoint: moqt://127.0.0.1:4443
  token_secret: env:BRIDGEFU_BROADCAST_TOKEN_SECRET

# Optional normal rvoip SIP↔WebRTC bridge, independent of the Amazon listener.
# Incoming SIP and WebRTC legs are paired FIFO in this 1.0 runtime.
generic_bridge:
  enabled: false
  sip_bind: 0.0.0.0:5070
  webrtc_ws_bind: 0.0.0.0:8080
  webrtc_whip_bind: 0.0.0.0:8081
  # bearer_token: env:BRIDGEFU_WEBRTC_TOKEN

# Configure any subset. Provider media is delivered through SIP/RTP.
providers:
  # twilio:
  #   account_sid: ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  #   auth_token: env:TWILIO_AUTH_TOKEN
  # telnyx:
  #   connection_id: "0000000000000000000"
  #   api_key: env:TELNYX_API_KEY
  #   webhook_public_key: env:TELNYX_WEBHOOK_PUBLIC_KEY
  # vonage:
  #   application_id: 00000000-0000-0000-0000-000000000000
