name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: bridgefu
      - uses: actions/checkout@v4
        with:
          repository: eisenzopf/rvoip
          # Coordinated Bridgefu 1.0 foundation revision. Update this only
          # after the matching rvoip change set is green and available on
          # the remote; never replace it with a floating branch.
          ref: a0335daf81ba5e18bddf960c61d4f5bc01c6079e
          path: rvoip
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bridgefu
            rvoip
      - run: cargo test --locked --all-targets
        working-directory: bridgefu
      # rvoip is a library workspace and intentionally does not commit its
      # Cargo.lock. Bridgefu's preceding locked build is the reproducible
      # consumer graph; this second pass exercises rvoip-only package tests.
      - name: rvoip foundation and QUIC tests
        run: >-
          cargo test
          -p rvoip-auth-core
          -p rvoip-core
          -p rvoip-uctp
          -p rvoip-quic
          -p rvoip-webtransport
          -p rvoip-moq
          --no-fail-fast
        working-directory: rvoip
      - name: rvoip peer lifecycle saturation test
        run: cargo test -p rvoip-websocket --test lifecycle_capacity
        working-directory: rvoip
      - name: rvoip SIP authentication tests
        run: |
          cargo test -p rvoip-sip-transport --all-features --no-fail-fast
          cargo test -p rvoip-sip-dialog --lib --no-fail-fast
          cargo test -p rvoip-sip --lib --no-fail-fast
        working-directory: rvoip
      - name: rvoip WebRTC signaling authentication tests
        run: >-
          cargo test -p rvoip-webrtc
          --features signaling-whip,signaling-ws,tls-rustls
          --test whip_auth
          --test ws_auth
          --test signaling_ownership
          --test tls_termination
          --no-fail-fast
        working-directory: rvoip

  image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: bridgefu
      - uses: actions/checkout@v4
        with:
          repository: eisenzopf/rvoip
          ref: a0335daf81ba5e18bddf960c61d4f5bc01c6079e
          path: rvoip
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: bridgefu
          file: bridgefu/Dockerfile
          build-contexts: rvoip=./rvoip
          tags: bridgefu:ci
          load: true
      - uses: anchore/sbom-action@v0
        with:
          image: bridgefu:ci
          format: spdx-json
          output-file: bridgefu.spdx.json
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bridgefu:ci
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
